<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Deniz OFFICIAL</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --accent: #FFD700; /* Gold */
      --sunny-orange: #FF8C00;
      --snap: #FFFC00;
      --bg: #0a0a0a;
      --glow-color: rgba(255, 215, 0, 0.8);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .glow-top {
      position: absolute;
      top: -15%;
      width: 120%;
      height: 60%;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.2) 0%, transparent 75%);
      z-index: 0;
      filter: blur(20px);
    }

    .card {
      position: relative;
      z-index: 10;
      width: 85%;
      max-width: 360px;
      padding: 30px 20px;
      background: rgba(10, 10, 10, 0.5);
      border: 1px solid rgba(255, 215, 0, 0.15);
      border-radius: 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.7);
    }

    h1 {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: -3px;
      cursor: pointer;
      background: linear-gradient(to bottom, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      user-select: none;
      margin-bottom: 5px;
    }

    /* --- Intensified Paradise Glow Box --- */
    .scene-container {
      margin: 15px auto 0;
      width: 85%;
      height: 150px;
      position: relative;
      padding: 5px; /* Space for the glow */
    }

    .paradise-box {
      width: 100%;
      height: 100%;
      border-radius: 25px;
      position: relative;
      overflow: hidden;
      background: #000;
      
      /* The intense glow layers */
      border: 3px solid rgba(255, 255, 255, 0.9);
      box-shadow: 
        0 0 10px rgba(255, 255, 255, 0.8),  /* Inner white */
        0 0 20px var(--glow-color),         /* Core gold */
        0 0 40px var(--glow-color),         /* Mid gold */
        0 0 70px rgba(255, 140, 0, 0.6),    /* Outer orange */
        inset 0 0 15px rgba(255, 215, 0, 0.5); /* Inner shadow */
      
      animation: neonPulse 2s infinite alternate;
    }

    @keyframes neonPulse {
      0% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px var(--glow-color), 0 0 40px var(--glow-color), 0 0 70px rgba(255, 140, 0, 0.6), inset 0 0 15px rgba(255, 215, 0, 0.5); }
      100% { box-shadow: 0 0 15px rgba(255, 255, 255, 1), 0 0 30px var(--glow-color), 0 0 60px var(--glow-color), 0 0 100px rgba(255, 140, 0, 0.8), inset 0 0 20px rgba(255, 215, 0, 0.7); }
    }

    .scene-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(1.1) contrast(1.1) saturate(1.2);
    }

    /* Paradise Vibe Glitter Effect over the GIF */
    .paradise-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3Y%3Cfilter id="noiseFilter"%3Y%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3Y%3C/filter%3Y%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3Y%3C/svg%3Y');
      opacity: 0.05;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .btn {
      position: fixed;
      bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 800;
      z-index: 20;
      transition: 0.3s;
    }
    
    .tiktok-btn { left: 20px; background: #fff; color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
    .snap-btn { right: 20px; background: var(--snap); color: black; box-shadow: 0 4px 15px rgba(255,252,0,0.2); }

    .tiktok-btn:hover, .snap-btn:hover { transform: translateY(-3px); }

    .music-bar {
      position: fixed;
      top: 25px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }
    .m-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.1); color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(5px);
    }

    @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    .high-mode { animation: rainbow 4s linear infinite; }
  </style>
</head>
<body id="mainBody">

  <div class="glow-top"></div>

  <div class="music-bar">
    <button class="m-btn" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
    <div style="font-size: 9px; opacity: 0.7; letter-spacing: 1px; color: var(--accent);" id="songTitle">SUMMER VIBES</div>
  </div>

  <audio id="audioPlayer" loop>
    <source src="https://files.catbox.moe/7ucnda.mp3" type="audio/mpeg">
  </audio>

  <main class="card">
    <p style="font-size: 9px; opacity: 0.6; letter-spacing: 4px; margin-bottom: 5px; color: #fff;">DENIZ OFFICIAL</p>
    <h1 id="heroName" onclick="handleEgg()">DENIZ</h1>
    
    <div class="scene-container">
      <div class="paradise-box">
        <img src="https://files.catbox.moe/vnqy9y.gif" class="scene-img" alt="Deniz Paradise">
        <div class="paradise-overlay"></div>
      </div>
    </div>
  </main>

  <a href="https://www.tiktok.com/@denizhavin.dgn" class="btn tiktok-btn" target="_blank">
    <i class="fa-brands fa-tiktok"></i><span>TIKTOK</span>
  </a>

  <a href="https://www.snapchat.com/add/denizhavin01" class="btn snap-btn" target="_blank">
    <i class="fa-brands fa-snapchat"></i><span>SNAP</span>
  </a>

  <script>
    const player = document.getElementById('audioPlayer');
    const btn = document.getElementById('playBtn');

    function togglePlay() {
      if (player.paused) {
        player.play();
        btn.innerHTML = '<i class="fa-solid fa-pause"></i>';
        btn.style.background = "var(--sunny-orange)";
        btn.style.boxShadow = "0 0 15px var(--sunny-orange)";
      } else {
        player.pause();
        btn.innerHTML = '<i class="fa-solid fa-play"></i>';
        btn.style.background = "rgba(255,255,255,0.1)";
        btn.style.boxShadow = "none";
      }
    }

    document.body.addEventListener('click', function() {
        if (player.paused) {
            togglePlay();
        }
    }, { once: true });

    let taps = 0;
    let timer;
    function handleEgg() {
      taps++;
      clearTimeout(timer);
      if(taps === 5) {
        document.getElementById('mainBody').classList.add('high-mode');
        document.getElementById('heroName').innerText = "HIGH MODE";
        taps = 0;
      }
      timer = setTimeout(() => { taps = 0; }, 2000);
    }
  </script>

</body>
</html>
